<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#faf9f5" />
<title>Gestion de Mesas</title>
<link rel="manifest" href="./manifest.json" />
<link rel="icon" type="image/svg+xml" href="./icon.svg" />
<link rel="apple-touch-icon" href="./icon.svg" />
<script>
  (function () {
    try {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <button id="btn-menu" class="icon-btn only-mobile" aria-label="Menu">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <span class="logo">ME</span>
    <h1 id="app-title" title="Click para renombrar">Gestion de Mesas</h1>
  </div>
  <div class="top-actions">
    <label class="btn btn-ghost" for="excel-input" title="Importar desde Excel">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5-5 5 5M12 5v12"/></svg>
      <span class="btn-label">Excel</span>
      <input id="excel-input" type="file" accept=".xlsx,.xls,.csv" hidden />
    </label>
    <button id="btn-export" class="btn btn-ghost" title="Descargar respaldo">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 14l5 5 5-5M12 19V7"/></svg>
      <span class="btn-label">Guardar</span>
    </button>
    <label class="btn btn-ghost" for="backup-input" title="Abrir respaldo">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v4H3zM3 11h18v10H3zM8 15h8"/></svg>
      <span class="btn-label">Abrir</span>
      <input id="backup-input" type="file" accept=".json,application/json" hidden />
    </label>
    <button id="btn-new-guest" class="btn btn-ghost">
      <span class="ico">+</span><span class="btn-label">Invitado</span>
    </button>
    <button id="btn-new-table" class="btn btn-primary">
      <span class="ico">+</span><span class="btn-label">Mesa</span>
    </button>
    <button id="btn-undo" class="icon-btn" title="Deshacer (Ctrl+Z)" aria-label="Deshacer">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
    </button>
    <button id="btn-theme" class="icon-btn" title="Cambiar tema" aria-label="Cambiar tema">
      <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button id="btn-reset" class="btn btn-danger-ghost only-desktop" title="Borrar todo">Resetear</button>
  </div>
</header>

<main class="layout">

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-head">
      <div class="counts">
        <div><strong id="count-total">0</strong><span>Invitados</span></div>
        <div><strong id="count-assigned">0</strong><span>Asignados</span></div>
        <div><strong id="count-unassigned">0</strong><span>Sin mesa</span></div>
        <div><strong id="count-tables">0</strong><span>Mesas</span></div>
      </div>
      <div class="view-tabs">
        <button class="tab-btn tab-active" data-view="guests">Invitados</button>
        <button class="tab-btn" data-view="tables">Mesas</button>
      </div>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Buscar..." />
      </div>
      <div class="filters" id="guest-filters">
        <button class="chip chip-active" data-filter="all">Todos</button>
        <button class="chip" data-filter="unassigned">Sin mesa</button>
        <button class="chip" data-filter="assigned">Asignados</button>
      </div>
    </div>
    <div id="guest-list" class="guest-list"></div>
    <div id="table-list" class="guest-list" style="display:none;"></div>
  </aside>
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <section class="canvas-wrap">
    <div id="canvas-outer" class="canvas-outer">
      <div id="canvas" class="canvas"></div>
    </div>
    <div class="zoom-controls">
      <button id="zoom-out" class="zoom-btn" title="Alejar (Ctrl+-)">−</button>
      <button id="zoom-label" class="zoom-btn zoom-label" title="100% (click para ajustar a todas las mesas)">100%</button>
      <button id="zoom-in" class="zoom-btn" title="Acercar (Ctrl++)">+</button>
    </div>
    <button id="btn-arrange" class="floating-btn" title="Ordenar mesas automaticamente">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </button>
  </section>
</main>

<!-- Modal: Guest Details -->
<div id="modal-guest" class="modal hidden">
  <div class="modal-card">
    <button class="modal-close" data-close>&times;</button>
    <h2 id="mg-name">Nombre</h2>
    <div class="modal-body">
      <label class="confirm-row">
        <input type="checkbox" id="mg-confirmed-input" />
        <span class="confirm-label">Confirmado</span>
      </label>
      <div class="field"><label>Nombre</label><input id="mg-name-input" /></div>
      <div class="field-row">
        <div class="field"><label>Telefono</label><input id="mg-phone-input" /></div>
        <div class="field"><label>Email</label><input id="mg-email-input" /></div>
      </div>
      <div class="field"><label>Nota</label><textarea id="mg-extra-input" rows="2"></textarea></div>
      <div class="field">
        <label>Mesa asignada</label>
        <select id="mg-table-select"></select>
      </div>

      <hr/>
      <div class="section-title">
        <h3>Acompanantes</h3>
        <button id="mg-add-plus" class="btn btn-ghost btn-sm">+ Agregar</button>
      </div>
      <div id="mg-children" class="children-list"></div>
    </div>
    <div class="modal-actions">
      <button id="mg-delete" class="btn btn-danger-ghost">Eliminar</button>
      <div>
        <button class="btn btn-ghost" data-close>Cerrar</button>
        <button id="mg-save" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Table Details -->
<div id="modal-table" class="modal hidden">
  <div class="modal-card">
    <button class="modal-close" data-close>&times;</button>
    <h2><span id="mt-name">Mesa</span> <span class="badge" id="mt-count">0</span></h2>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>Nombre</label><input id="mt-name-input" /></div>
        <div class="field field-sm"><label>Capacidad</label><input id="mt-capacity-input" type="number" min="1" /></div>
      </div>
      <div class="field">
        <label>Forma</label>
        <div class="shape-picker">
          <label class="shape-option">
            <input type="radio" name="mt-shape" value="circle">
            <span class="shape-preview"><span class="shape-draw circle"></span></span>
            <span class="shape-name">Redonda</span>
          </label>
          <label class="shape-option">
            <input type="radio" name="mt-shape" value="square">
            <span class="shape-preview"><span class="shape-draw rect"></span></span>
            <span class="shape-name">Rectangular</span>
          </label>
        </div>
      </div>

      <div class="section-title"><h3>Invitados en esta mesa</h3></div>
      <div id="mt-members" class="table-members"></div>

      <div class="section-title" style="margin-top:18px;">
        <h3>Agregar rapido</h3>
      </div>
      <div class="quick-add">
        <input id="mt-quick" type="text" list="mt-quick-list" placeholder="Buscar invitado sin mesa..." />
        <datalist id="mt-quick-list"></datalist>
        <button id="mt-quick-add" class="btn btn-primary">Agregar</button>
      </div>
      <div class="quick-add">
        <input id="mt-new" type="text" placeholder="O crear nuevo (solo nombre)..." />
        <button id="mt-new-add" class="btn btn-primary">Crear</button>
      </div>
    </div>
    <div class="modal-actions">
      <button id="mt-delete" class="btn btn-danger-ghost">Eliminar mesa</button>
      <div>
        <button class="btn btn-ghost" data-close>Cerrar</button>
        <button id="mt-save" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: New Guest -->
<div id="modal-new-guest" class="modal hidden">
  <div class="modal-card modal-sm">
    <button class="modal-close" data-close>&times;</button>
    <h2>Nuevo invitado</h2>
    <div class="modal-body">
      <div class="field"><label>Nombre *</label><input id="ng-name" /></div>
      <div class="field"><label>Telefono</label><input id="ng-phone" /></div>
      <div class="field"><label>Email</label><input id="ng-email" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close>Cancelar</button>
      <button id="ng-save" class="btn btn-primary">Crear</button>
    </div>
  </div>
</div>

<!-- Modal: New Table -->
<div id="modal-new-table" class="modal hidden">
  <div class="modal-card modal-sm">
    <button class="modal-close" data-close>&times;</button>
    <h2>Nueva mesa</h2>
    <div class="modal-body">
      <div class="field"><label>Nombre *</label><input id="nt-name" placeholder="Ej. Mesa 1" /></div>
      <div class="field-row">
        <div class="field"><label>Capacidad</label><input id="nt-capacity" type="number" value="10" min="1" /></div>
        <div class="field field-sm"><label>Cantidad</label><input id="nt-count" type="number" value="1" min="1" max="50" /></div>
      </div>
      <div class="field">
        <label>Forma</label>
        <div class="shape-picker">
          <label class="shape-option">
            <input type="radio" name="nt-shape" value="circle" checked>
            <span class="shape-preview"><span class="shape-draw circle"></span></span>
            <span class="shape-name">Redonda</span>
          </label>
          <label class="shape-option">
            <input type="radio" name="nt-shape" value="square">
            <span class="shape-preview"><span class="shape-draw rect"></span></span>
            <span class="shape-name">Rectangular</span>
          </label>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close>Cancelar</button>
      <button id="nt-save" class="btn btn-primary">Crear</button>
    </div>
  </div>
</div>

<!-- Modal: Excel Column Mapping -->
<div id="modal-import" class="modal hidden">
  <div class="modal-card">
    <button class="modal-close" data-close>&times;</button>
    <h2>Importar desde Excel</h2>
    <div class="modal-body">
      <div class="import-grid">
        <div class="field"><label>Nombre *</label><select id="imp-name"></select></div>
        <div class="field"><label>Telefono</label><select id="imp-phone"></select></div>
        <div class="field"><label>Email</label><select id="imp-email"></select></div>
        <div class="field"><label>Nota/Extra</label><select id="imp-extra"></select></div>
        <div class="field"><label>Cantidad (x asientos)</label><select id="imp-size"></select></div>
      </div>
      <div class="import-preview">
        <table><thead id="imp-thead"></thead><tbody id="imp-tbody"></tbody></table>
      </div>
      <p id="imp-count" class="hint"></p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close>Cancelar</button>
      <button id="imp-confirm" class="btn btn-primary">Importar</button>
    </div>
  </div>
</div>

<!-- Modal: Confirm / Prompt -->
<div id="modal-dialog" class="modal hidden">
  <div class="modal-card modal-sm">
    <h2 id="md-title">Confirmar</h2>
    <div class="modal-body">
      <p id="md-message" class="dialog-msg"></p>
      <div class="field" id="md-input-wrap" style="display:none;">
        <input id="md-input" type="text" />
      </div>
    </div>
    <div class="modal-actions">
      <button id="md-cancel" class="btn btn-ghost">Cancelar</button>
      <button id="md-ok" class="btn btn-primary">Aceptar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<div id="drag-ghost" class="drag-ghost hidden"></div>
<div id="seat-tip" class="seat-tip hidden"></div>

<script src="app.js" type="module"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
